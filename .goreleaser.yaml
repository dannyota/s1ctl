version: 2

project_name: s1ctl

before:
  hooks:
    - go mod tidy

builds:
  - id: s1ctl
    main: ./cmd/s1ctl/
    binary: s1ctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X danny.vn/s1/internal/cli.version={{.Version}}
      - -X danny.vn/s1/internal/cli.commit={{.ShortCommit}}
      - -X danny.vn/s1/internal/cli.date={{.Date}}

archives:
  - id: s1ctl
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

# Keyless cosign signature of the checksums file (verifiable with
# `cosign verify-blob --bundle checksums.txt.bundle checksums.txt`).
# Requires cosign v2.5+ on the runner + id-token: write (both set in release.yml).
signs:
  - cmd: cosign
    signature: ${artifact}.bundle
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: false
  prerelease: auto
