<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting — s1ctl</title>
  <script>
    var path = location.pathname;
    if (path.length > 1) {
      location.replace('/#' + path + location.search);
    } else {
      location.replace('/');
    }
  </script>
</head>
<body>
  <p>Redirecting&hellip;</p>
</body>
</html>
