<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <title>s1ctl</title>
  <meta name="description" content="Operate SentinelOne Singularity Platform as code">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="s1ctl">
  <meta property="og:title" content="s1ctl — operate SentinelOne as code">
  <meta property="og:description" content="Operate SentinelOne Singularity Platform as code">
  <meta property="og:url" content="https://s1ctl.danny.vn">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="s1ctl — operate SentinelOne as code">
  <meta name="twitter:description" content="Operate SentinelOne Singularity Platform as code">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">

  <!-- docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"
        integrity="sha384-G+RAlt+LEfAH/nY+DZh3+XIhRboypMI32hiJ9BwnmjF41May5BWQKyrDrEkNdV/i"
        crossorigin="anonymous">
  <!-- right-sidebar TOC plugin -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-plugin-toc@1/dist/docsify-plugin-toc.min.css"
        integrity="sha384-iUsEeG7K3AJxE8lMa4KjI6l9lZO31tdzvHxNbVRjRUOcd768cHrLK/ZR6Vsx3BGo"
        crossorigin="anonymous">
  <!-- Set theme before first paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') { document.documentElement.setAttribute('data-theme', t); }
        else { document.documentElement.setAttribute('data-theme', window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }
        var f = localStorage.getItem('font');
        if (f !== 'mono') document.documentElement.setAttribute('data-font', 'readable');
        var tc = localStorage.getItem('toc');
        if (tc !== 'visible') document.documentElement.classList.add('toc-hidden');
      } catch (e) {}
    })();
  </script>
  <style>
    /* dark theme (default) */
    :root {
      --base-background-color: #0a0e14;
      --cover-background-color: #0a0e14;
      --sidebar-background: #0f141c;
      --sidebar-border-color: #1f2933;
      --sidebar-nav-link-color--active: #6c5ce7;
      --sidebar-nav-link-border-color--active: #6c5ce7;
      --sidebar-name-color: #6c5ce7;
      --heading-color: #c9d1d9;
      --heading-h2-border-color: #1f2933;
      --base-color: #c9d1d9;
      --base-font-family: ui-monospace, "JetBrains Mono", "Fira Code", SFMono-Regular, Menlo, Consolas, monospace;
      --base-font-size: 15px;
      --base-line-height: 1.65;
      --link-color: #56d4dd;
      --link-color--hover: #6c5ce7;
      --code-inline-background: #161d28;
      --code-inline-color: #c9d1d9;
      --code-block-background: #0f141c;
      --code-block-border-color: #1f2933;
      --blockquote-border-color: #6c5ce7;
      --blockquote-background: #0f141c;
      --table-head-background: #161d28;
      --table-row-even-background: #0f141c;
      --table-cell-border-color: #1f2933;
      --search-background: #0f141c;
      --search-result-keyword-color: #6c5ce7;
      --notice-tip-border-color: #6c5ce7;
      --accent: #6c5ce7;
      --accent2: #56d4dd;
      --muted: #6e7681;
      --border: #1f2933;
      --sb-thumb: #1f2933;
    }

    /* light theme */
    :root[data-theme="light"] {
      --base-background-color: #ffffff;
      --cover-background-color: #ffffff;
      --sidebar-background: #f6f8fa;
      --sidebar-border-color: #d0d7de;
      --heading-color: #1f2328;
      --heading-h2-border-color: #d0d7de;
      --base-color: #1f2328;
      --link-color: #0969da;
      --link-color--hover: #5b4cdb;
      --code-inline-background: #eff1f3;
      --code-inline-color: #1f2328;
      --code-block-background: #f6f8fa;
      --code-block-border-color: #d0d7de;
      --blockquote-background: #f6f8fa;
      --table-head-background: #f6f8fa;
      --table-head-color: #1f2328;
      --table-row-even-background: #f6f8fa;
      --table-row-odd-background: #ffffff;
      --table-cell-border-color: #d0d7de;
      --search-background: #f6f8fa;
      --search-input-color: #1f2328;
      --search-input-placeholder-color: #656d76;
      --search-input-background-color: #ffffff;
      --search-input-border-color: #d0d7de;
      --search-clear-icon-color1: #656d76;
      --search-clear-icon-color2: #ffffff;
      --search-input-background-image: url("data:image/svg+xml,%3Csvg height='20px' width='20px' viewBox='0 0 24 24' fill='none' stroke='rgba(0%2C 0%2C 0%2C 0.3)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10.5' cy='10.5' r='7.5'%3E%3C/circle%3E%3Cline x1='21' y1='21' x2='15.8' y2='15.8'%3E%3C/line%3E%3C/svg%3E");
      --accent: #5b4cdb;
      --accent2: #0969da;
      --muted: #656d76;
      --border: #d0d7de;
      --sb-thumb: #d0d7de;
    }

    :root[data-theme="light"] .sidebar .search input[type=search] {
      color: #1f2328;
    }
    :root[data-theme="light"] .sidebar .search input[type=search]::placeholder {
      color: #656d76;
    }
    .search .input-wrap {
      position: relative;
    }
    .search .clear-button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .search .clear-button:hover {
      color: var(--accent);
    }
    .search input {
      padding-right: 28px;
    }

    .sidebar-nav > ul > li > a {
      font-weight: 700;
      color: var(--accent) !important;
    }
    .sidebar-nav li.active > p > a {
      color: var(--sidebar-nav-link-color--active, var(--accent));
      border-right: 2px solid var(--sidebar-nav-link-border-color--active, var(--accent));
      padding-right: 6px;
    }

    .markdown-section h1 {
      color: var(--accent);
    }

    .markdown-section h2::before {
      content: "# ";
      color: var(--accent2);
    }

    .markdown-section h3::before {
      content: "## ";
      color: var(--muted);
    }

    .markdown-section code {
      border: 1px solid var(--border);
      border-radius: 5px;
    }

    .app-name-link {
      font-family: var(--base-font-family);
      letter-spacing: 0.2px;
    }

    .app-name-link::before {
      content: "$ ";
      color: var(--accent);
    }

    /* blinking cursor after sidebar title */
    .app-name-link::after {
      content: "\2588";
      color: var(--accent);
      animation: blink 1.1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* bottom-right controls */
    .sidebar-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 50;
      display: flex;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .sidebar-controls button {
      font: 13px/1 ui-monospace, "JetBrains Mono", "Fira Code", SFMono-Regular, Menlo, Consolas, monospace;
      cursor: pointer;
      color: var(--base-color);
      background: var(--sidebar-background);
      border: none;
      border-right: 1px solid var(--border);
      padding: 10px 14px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }
    .sidebar-controls button:last-child {
      border-right: none;
    }
    .sidebar-controls button:hover {
      background: var(--base-background-color);
      color: var(--accent);
    }

    /* readable font — Inter for body, keep mono for code */
    :root[data-font="readable"] {
      --base-font-family: "Inter", "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --base-font-size: 16px;
      --base-line-height: 1.75;
    }

    /* GitHub corner adapts to theme */
    .github-corner svg {
      fill: var(--accent);
      color: var(--base-background-color);
    }

    /* table styling */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      display: table;
    }
    .markdown-section th {
      background: var(--table-head-background);
      color: var(--heading-color);
      font-weight: 700;
      border: 1px solid var(--table-cell-border-color);
      padding: 8px 12px;
    }
    .markdown-section td {
      border: 1px solid var(--table-cell-border-color);
      padding: 8px 12px;
      color: var(--base-color);
    }
    .markdown-section tr:nth-child(even) td {
      background: var(--table-row-even-background);
    }
    .markdown-section tr:nth-child(odd) td {
      background: var(--base-background-color);
    }

    /* wider sidebar + content, no text truncation */
    :root {
      --sidebar-width: 280px;
      --content-max-width: 800px;
      --sidebar-toggle-height: 28px;
      --sidebar-toggle-width: 28px;
      --sidebar-toggle-icon-width: 12px;
      --sidebar-toggle-icon-height: 8px;
      --sidebar-toggle-icon-stroke-width: 1px;
    }
    @media (min-width: 48em) {
      .sidebar-toggle {
        top: auto !important;
        bottom: 24px;
        left: 0;
      }
    }
    .markdown-section {
      padding: 30px 40px 30px 30px;
    }
    .sidebar-nav li a {
      overflow: visible;
      white-space: normal;
      text-overflow: unset;
    }
    .sidebar-nav li {
      overflow: visible;
    }
    .sidebar {
      overflow-x: hidden;
    }
    .sidebar-nav {
      margin-top: 8px;
    }

    /* right sidebar TOC */
    .page_toc {
      position: fixed;
      top: 0;
      right: 0;
      width: 200px;
      height: 100vh;
      overflow-y: auto;
      padding: 60px 16px 20px 16px;
      border-left: 1px solid var(--border);
      background: var(--base-background-color);
      z-index: 10;
      box-sizing: border-box;
    }
    .page_toc a {
      font-family: var(--base-font-family);
      font-size: 13px;
      line-height: 1.6;
      padding: 3px 0 3px 12px;
      border-left: 2px solid var(--border);
      color: var(--muted) !important;
      text-decoration: none !important;
      display: block;
      transition: color .15s, border-color .15s;
    }
    .page_toc a:hover,
    .page_toc a.active {
      color: var(--accent) !important;
      border-left-color: var(--accent);
    }
    .page_toc .lv3 a,
    .page_toc a[data-level="3"] {
      padding-left: 24px;
      font-size: 12px;
    }
    .page_toc.hidden,
    .toc-hidden .page_toc {
      display: none;
    }
    :root:not(.toc-hidden) section.content {
      margin-right: 200px;
    }
    @media (max-width: 1100px) {
      .page_toc { display: none; }
      section.content { margin-right: 0 !important; }
    }

    /* center mermaid diagrams */
    .mermaid {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 24px auto;
      width: 100%;
    }
    .mermaid svg {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--sb-thumb); border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div class="sidebar-controls">
    <button id="toc-toggle" type="button" aria-label="Toggle table of contents"></button>
    <button id="font-toggle" type="button" aria-label="Toggle font"></button>
    <button id="theme-toggle" type="button" aria-label="Toggle theme"></button>
  </div>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 's1ctl',
      repo: 'https://github.com/dannyota/s1ctl',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      toc: {
        tocMaxLevel: 3,
        target: 'h2, h3',
        ignoreHeaders: ['<!-- {docsify-ignore} -->'],
      },
      search: {
        placeholder: 'Search docs',
        noData: 'No results',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied',
      },
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              var escaped = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
              return '<div class="mermaid">' + escaped + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"
          integrity="sha384-KaHhgnx/OTLoJ4J33SSJsF4x1pk4I7q3s5ZOfIDHJYl6IG7Oyn2vNDsHiWJe46fD"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"
          integrity="sha384-LthJPBJ4RGco78kBY+EmKz5rmISZ5vrtAu3+l2ALQ2mrZHOe6Wyf6knyKjeC4cL6"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"
          integrity="sha384-t4d9b4/0dEBkoJ5e77XEPBrqJ790jbFQFmEaTbBqIlTDeGosM1AbZvC1NQwqTg+5"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-toc@1/dist/docsify-plugin-toc.min.js"
          integrity="sha384-icWHoofPSfLRreEAp2noqJ/rqON+5+nVSSvkzXla4qliMT+DP2V1dEaFsEIzjJDd"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"
          integrity="sha384-9WmlN8ABpoFSSHvBGGjhvB3E/D8UkNB9HpLJjBQFC2VSQsM1odiQDv4NbEo+7l15"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"
          integrity="sha384-YxCco6ByOY5rJ3jD18514fa8w5so07zigIyV6tZa3CWSE5vYrbDSuFkZ5zOknnZ6"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"
          integrity="sha384-AKAiycghK0jDCjD+aavMHzDkLzRR7Yzcwh3+xL/295cvyVMe+cxQfyQC8xxGGcI8"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
          integrity="sha384-qX9VvWkP79m/O121ZE6sOYp0nf/pldQgtvWDbkpzi+3mUo4Wn4Ix4cFzNPay3VaB"
          crossorigin="anonymous"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: document.documentElement.getAttribute('data-theme') !== 'light' ? 'dark' : 'default' });
    window._mermaidSources = {};
    function rerenderMermaid() {
      var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
      document.querySelectorAll('.mermaid').forEach(function (el) {
        var id = el.getAttribute('data-mermaid-id');
        if (id && window._mermaidSources[id]) {
          el.textContent = window._mermaidSources[id];
        }
        el.removeAttribute('data-processed');
        el.innerHTML = el.textContent;
      });
      mermaid.run({ querySelector: '.mermaid' });
    }
    function initMermaid(hook) {
      hook.doneEach(function () {
        document.querySelectorAll('.mermaid').forEach(function (el, i) {
          var id = 'mmd-' + i;
          el.setAttribute('data-mermaid-id', id);
          window._mermaidSources[id] = el.textContent;
        });
        rerenderMermaid();
      });
    }
    function initTocState(hook) {
      hook.doneEach(function () { applyToc(tocMode()); });
    }
    function initHomeActive(hook) {
      hook.doneEach(function () {
        var hash = window.location.hash;
        var isHome = !hash || hash === '#' || hash === '#/' || hash === '#/?id=';
        document.querySelectorAll('.sidebar-nav a').forEach(function (a) {
          var href = a.getAttribute('href');
          if (href === '#/' || href === '#' || href === '/') {
            var li = a.closest('li');
            if (li) {
              if (isHome) li.classList.add('active');
              else li.classList.remove('active');
            }
          }
        });
      });
    }
    window.$docsify = window.$docsify || {};
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(initMermaid, initTocState, initHomeActive);
  </script>
  <script>
    function sysDark() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }
    function themeMode() {
      try { var t = localStorage.getItem('theme'); if (t === 'light' || t === 'dark') return t; } catch (e) {}
      return sysDark() ? 'dark' : 'light';
    }
    function applyTheme(m) {
      document.documentElement.setAttribute('data-theme', m);
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = (m === 'dark' ? '☾' : '☀') + ' ' + (m === 'dark' ? 'Dark' : 'Light');
    }
    function tocMode() {
      try { var v = localStorage.getItem('toc'); if (v === 'visible') return v; } catch (e) {}
      return 'hidden';
    }
    function applyToc(v) {
      var toc = document.querySelector('.page_toc');
      var btn = document.getElementById('toc-toggle');
      if (toc) {
        if (v === 'hidden') { toc.classList.add('hidden'); document.documentElement.classList.add('toc-hidden'); }
        else { toc.classList.remove('hidden'); document.documentElement.classList.remove('toc-hidden'); }
      }
      if (btn) btn.textContent = v === 'hidden' ? 'TOC ▸' : 'TOC ◂';
    }
    function fontMode() {
      try { var f = localStorage.getItem('font'); if (f === 'mono') return f; } catch (e) {}
      return 'readable';
    }
    function applyFont(f) {
      if (f === 'mono') document.documentElement.removeAttribute('data-font');
      else document.documentElement.setAttribute('data-font', 'readable');
      var btn = document.getElementById('font-toggle');
      if (btn) btn.textContent = f === 'mono' ? 'Mono' : 'Sans';
    }
    applyTheme(themeMode());
    applyFont(fontMode());
    document.addEventListener('DOMContentLoaded', function () {
      applyTheme(themeMode());
      applyFont(fontMode());
      applyToc(tocMode());
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var next = themeMode() === 'dark' ? 'light' : 'dark';
        try { localStorage.setItem('theme', next); } catch (e) {}
        applyTheme(next);
        rerenderMermaid();
      });
      document.getElementById('font-toggle').addEventListener('click', function () {
        var next = fontMode() === 'readable' ? 'mono' : 'readable';
        try { localStorage.setItem('font', next); } catch (e) {}
        applyFont(next);
      });
      document.getElementById('toc-toggle').addEventListener('click', function () {
        var next = tocMode() === 'hidden' ? 'visible' : 'hidden';
        try { localStorage.setItem('toc', next); } catch (e) {}
        applyToc(next);
      });
    });
  </script>
</body>
</html>
